<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
  <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>
      {{ col.label }}
    </th>

    <td mat-cell *matCellDef="let row">
      @switch (col.key) {
        @case ('startDate') {
          <span>{{ row[col.key] | date: 'dd/MM/yyyy' }}</span>
        }

        @case ('actions') {
          <button mat-icon-button type="button" (click)="onView(row)">
            <mat-icon color="primary">visibility</mat-icon>
          </button>
        }

        @default {
          <span>{{ row[col.key] }}</span>
        }
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns.map((c) => c.key)"></tr>

  <tr mat-row *matRowDef="let row; columns: columns.map((c) => c.key)"></tr>
</table>

<div *ngIf="dataSource.data.length === 0" class="empty-state">
  <mat-icon color="warn">search_off</mat-icon>
  <p>No se encontraron resultados</p>
</div>

<mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]"></mat-paginator>
